# Free external scheduler for sub-daily STAFFD workers.
#
# Why this file exists:
#   Vercel Hobby caps you at "2 cron jobs, daily-only". The codebase has
#   workers that need to run more often:
#     • vault                 — every minute (ingestion queue drain)
#     • brief-push-dispatcher — every 15 min (per-user push delivery)
#   This GitHub Actions workflow takes the place of those Vercel crons,
#   running on GitHub's infrastructure at zero cost.
#
# Required GitHub repo secrets:
#   • WORKER_SECRET   — same value as Vercel WORKER_SECRET env var
#   • DEPLOY_URL      — production host, e.g. "https://urstaffd.com"
#
# Cadence note:
#   GitHub Actions cron has ~minute-level resolution but jobs are best-effort
#   and can drift 5-15 minutes during high load. For STAFFD's product
#   semantics that's acceptable (vault ingest lag ~5min worst case vs.
#   the user's wait for a draft is generally minutes-to-hours; brief
#   delivery lag is similarly bounded).
#
# Upgrade path:
#   When this account moves to Vercel Pro, restore the per-worker Vercel
#   crons in vercel.json and either delete this file or keep it as a
#   redundant safety net.

name: STAFFD workers

on:
  schedule:
    # Vault queue — every 5 minutes. GH Actions minimum is */5 in practice.
    - cron: "*/5 * * * *"
    # Brief push dispatcher — every 15 minutes.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker slug to trigger manually (vault | brief-push-dispatcher | morning-brief | scheduled)"
        required: true
        default: "vault"

jobs:
  vault:
    # Run on every */5 tick (which fires on minutes 0,5,10,…). The */15 schedule
    # ALSO fires on minutes 0,15,30,45 — so this job runs twice at those marks.
    # Cheap and idempotent; not worth the conditional gymnastics to dedupe.
    if: github.event_name != 'workflow_dispatch' || inputs.worker == 'vault'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping vault worker
        run: |
          curl -sS --max-time 240 \
            -H "x-worker-secret: ${{ secrets.WORKER_SECRET }}" \
            "${{ secrets.DEPLOY_URL }}/api/worker/vault" \
            | head -c 2000
          echo

  brief-push-dispatcher:
    # Only on the */15 schedule (minutes 0,15,30,45), not every */5 tick.
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *')
      || (github.event_name == 'workflow_dispatch' && inputs.worker == 'brief-push-dispatcher')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping brief-push-dispatcher
        run: |
          curl -sS --max-time 240 \
            -H "x-worker-secret: ${{ secrets.WORKER_SECRET }}" \
            "${{ secrets.DEPLOY_URL }}/api/worker/brief-push-dispatcher" \
            | head -c 2000
          echo

  manual:
    # Manual one-off for morning-brief / scheduled / anything else.
    if: |
      github.event_name == 'workflow_dispatch'
      && inputs.worker != 'vault'
      && inputs.worker != 'brief-push-dispatcher'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping ${{ inputs.worker }}
        run: |
          curl -sS --max-time 540 \
            -H "x-worker-secret: ${{ secrets.WORKER_SECRET }}" \
            "${{ secrets.DEPLOY_URL }}/api/worker/${{ inputs.worker }}" \
            | head -c 4000
          echo
